<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RETRO ARCADE</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #blocker {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      cursor: pointer;
    }

    #blocker.hidden { display: none; }

    #instructions {
      text-align: center;
      color: #f0f;
    }

    #instructions h1 {
      font-size: 3.5rem;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
      color: #fff;
      text-shadow: 0 0 10px #f0f, 0 0 30px #f0f, 0 0 60px #00f;
    }

    #instructions .neon-sub {
      font-size: 0.9rem;
      color: #0ff;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px #0ff;
      letter-spacing: 0.5em;
    }

    #instructions .controls {
      font-size: 1rem;
      color: #aaf;
      margin: 0.3rem 0;
      text-shadow: 0 0 8px #66f;
    }

    #instructions .click-enter {
      font-size: 1.3rem;
      color: #f0f;
      margin: 1rem 0;
      text-shadow: 0 0 20px #f0f;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    #instructions .subtitle {
      font-size: 0.8rem;
      color: #666;
      margin-top: 2rem;
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.4);
      font-size: 20px;
      pointer-events: none;
      z-index: 10;
      font-family: monospace;
    }

    #prompt {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 10;
      font-family: monospace;
      letter-spacing: 0.15em;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div id="blocker">
    <div id="instructions">
      <h1>RETRO ARCADE</h1>
      <div class="neon-sub">✦ 3D GAME COLLECTION ✦</div>
      <p class="click-enter">▸ CLICK TO ENTER ◂</p>
      <p class="controls">WASD — MOVE &nbsp;|&nbsp; MOUSE — LOOK &nbsp;|&nbsp; CLICK — PLAY</p>
      <p class="subtitle">— walk around and click a cabinet to launch a game —</p>
    </div>
  </div>
  <div id="crosshair">+</div>
  <div id="prompt">▸ FIND A CABINET ◂</div>
  <script type="module" src="main.js"></script>
</body>
</html>
