<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karen's Cookbook</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Splash / start screen: also satisfies the browser autoplay gesture. -->
  <div id="splash" class="splash">
    <div class="splash-window window">
      <div class="title-bar">
        <span class="title-bar-text">Welcome</span>
        <div class="title-bar-controls">
          <button class="title-btn" aria-hidden="true" tabindex="-1">_</button>
          <button class="title-btn" aria-hidden="true" tabindex="-1">□</button>
          <button class="title-btn" aria-hidden="true" tabindex="-1">×</button>
        </div>
      </div>
      <div class="splash-body">
        <h1 class="splash-title">Karen's Cookbook</h1>
        <p class="splash-sub">Multimedia Edition &nbsp;•&nbsp; 1996</p>
        <p class="splash-note">Sound on, please. Karen has a lot to say.</p>
        <button id="start-btn" class="btn btn-large">Start Cooking</button>
      </div>
    </div>
  </div>

  <!-- Main application window. -->
  <div class="window app-window">
    <div class="title-bar">
      <span class="title-bar-text">📖 Karen's Cookbook</span>
      <div class="title-bar-controls">
        <button class="title-btn" aria-hidden="true" tabindex="-1">_</button>
        <button class="title-btn" aria-hidden="true" tabindex="-1">□</button>
        <button class="title-btn" aria-hidden="true" tabindex="-1">×</button>
      </div>
    </div>

    <!-- Menu bar (cosmetic, period-accurate). -->
    <div class="menu-bar">
      <span class="menu-item">File</span>
      <span class="menu-item">Edit</span>
      <span class="menu-item">View</span>
      <span class="menu-item">Help</span>
    </div>

    <!-- Toolbar. Each button just provokes a Karen reaction (for now). -->
    <div class="toolbar">
      <button class="btn" data-action="new">＋ New Recipe</button>
      <button class="btn" data-action="edit">Edit</button>
      <button class="btn" data-action="delete">Delete</button>
    </div>

    <!-- Filter bar. -->
    <div class="filter-bar">
      <label for="search">Search:</label>
      <input id="search" type="text" placeholder="Search recipes..." autocomplete="off" />
      <label for="category">Category:</label>
      <select id="category"></select>
    </div>

    <!-- Split panes: recipe list + detail. -->
    <div class="content">
      <ul id="recipe-list" class="recipe-list"></ul>
      <div id="recipe-detail" class="recipe-detail"></div>
    </div>

    <!-- Status bar. -->
    <div class="status-bar">
      <span class="status-cell">Ready</span>
      <span class="status-cell">Karen's Cookbook v1.0</span>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
