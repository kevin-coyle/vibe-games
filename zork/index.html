<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORK — Interactive Fiction</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
  }

  .crt {
    position: relative;
    width: 1000px;
    max-width: 95vw;
    aspect-ratio: 4 / 3;
    background: #0a0a0a;
    border-radius: 40px;
    padding: 45px 50px;
    box-shadow:
      inset 0 0 80px rgba(0, 255, 0, 0.03),
      0 0 60px rgba(0, 255, 0, 0.08),
      0 0 120px rgba(0, 0, 0, 0.9);
    border: 2px solid #1a1a1a;
    overflow: hidden;
  }

  .crt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 2px,
      transparent 2px,
      transparent 4px
    );
    pointer-events: none;
    z-index: 10;
    border-radius: 40px;
  }

  .crt::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 11;
    border-radius: 40px;
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    gap: 20px;
    z-index: 1;
  }

  .game-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
    scrollbar-width: thin;
    scrollbar-color: #0a0 #1a1a1a;
  }

  .output::-webkit-scrollbar { width: 6px; }
  .output::-webkit-scrollbar-track { background: #1a1a1a; }
  .output::-webkit-scrollbar-thumb { background: #0a0; border-radius: 3px; }

  .output p {
    color: #0c0;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 3px;
    text-shadow: 0 0 3px rgba(0, 255, 0, 0.4);
    word-wrap: break-word;
  }

  .output p.command {
    color: #0f0;
    text-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
  }

  .output p.highlight {
    color: #0f0;
    text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
  }

  .output p.dim {
    color: #080;
    text-shadow: 0 0 2px rgba(0, 255, 0, 0.15);
  }

  .output p.item {
    color: #0e0;
    text-shadow: 0 0 4px rgba(0, 255, 0, 0.35);
  }

  .output p.error {
    color: #060;
    text-shadow: 0 0 2px rgba(0, 255, 0, 0.15);
  }

  .input-line {
    display: flex;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #1a3a1a;
  }

  .input-line .prompt {
    color: #0c0;
    font-size: 15px;
    text-shadow: 0 0 4px rgba(0, 255, 0, 0.4);
    margin-right: 6px;
    white-space: nowrap;
  }

  .input-line input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #0f0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    text-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
    caret-color: #0f0;
  }

  .input-line input::placeholder {
    color: #060;
  }

  .map-panel {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #1a3a1a;
    padding-left: 20px;
  }

  .map-panel .map-title {
    color: #0a0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 12px;
    text-shadow: 0 0 3px rgba(0, 255, 0, 0.2);
    border-bottom: 1px solid #1a3a1a;
    padding-bottom: 6px;
  }

  .map-container {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .map-container svg {
    width: 100%;
    height: 100%;
  }

  .room-label {
    fill: #0c0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    text-anchor: middle;
    dominant-baseline: middle;
    text-shadow: none;
  }

  .room-label.current {
    fill: #0f0;
    font-size: 10px;
    font-weight: bold;
  }

  .room-rect {
    fill: #0a0a0a;
    stroke: #1a4a1a;
    stroke-width: 1.5;
    rx: 3;
    ry: 3;
  }

  .room-rect.current {
    stroke: #0f0;
    stroke-width: 2;
    filter: url(#glow);
  }

  .room-rect.visited {
    stroke: #0a0;
    stroke-width: 1.5;
  }

  .room-rect.unvisited {
    stroke: #1a2a1a;
    stroke-width: 1;
  }

  .edge {
    stroke: #0a0;
    stroke-width: 1;
    stroke-dasharray: 3 2;
  }

  .edge.used {
    stroke: #0f0;
    stroke-dasharray: none;
  }

  .status-line {
    border-top: 1px solid #1a3a1a;
    padding-top: 6px;
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    color: #080;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .status-line span {
    text-shadow: 0 0 3px rgba(0, 255, 0, 0.15);
  }

  .status-line .label {
    color: #050;
  }

  /* Flicker animation */
  @keyframes flicker {
    0% { opacity: 0.97; }
    5% { opacity: 0.85; }
    10% { opacity: 0.97; }
    15% { opacity: 0.92; }
    20% { opacity: 0.97; }
    50% { opacity: 0.98; }
    80% { opacity: 0.95; }
    90% { opacity: 0.98; }
    100% { opacity: 0.97; }
  }

  .crt {
    animation: flicker 0.15s infinite;
  }

  /* Blinking cursor on last line */
  .blink-cursor::after {
    content: '\u2588';
    color: #0f0;
    animation: blink 1s step-end infinite;
    text-shadow: 0 0 5px rgba(0, 255, 0, 0.6);
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  /* turn-on animation */
  @keyframes turn-on {
    0% { transform: scaleY(0.01) scaleX(0.01); filter: brightness(30); }
    30% { transform: scaleY(0.01) scaleX(1); filter: brightness(10); }
    60% { transform: scaleY(0.5) scaleX(1); filter: brightness(3); }
    100% { transform: scaleY(1) scaleX(1); filter: brightness(1); }
  }

  .crt.turning-on {
    animation: turn-on 1.2s ease-out forwards;
  }

  .crt.turning-on::before,
  .crt.turning-on::after {
    animation: none;
  }

  .score-line {
    border-top: 1px solid #1a3a1a;
    padding-top: 6px;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
    color: #080;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-line span { text-shadow: 0 0 3px rgba(0, 255, 0, 0.15); }
</style>
</head>
<body>

<div class="crt turning-on" id="crt">
  <div class="screen">
    <div class="game-panel">
      <div class="output" id="output"></div>
      <div class="input-line">
        <span class="prompt">&gt;</span>
        <input type="text" id="input" autofocus placeholder="Type a command..." spellcheck="false" autocomplete="off">
      </div>
    </div>
    <div class="map-panel">
      <div class="map-title">&#9673; surroundings</div>
      <div class="map-container" id="mapContainer"></div>
      <div class="status-line">
        <span><span class="label">loc:</span> <span id="locationName">West of House</span></span>
        <span><span class="label">mv:</span> <span id="moveCount">0</span></span>
      </div>
      <div class="score-line">
        <span><span class="label">score:</span> <span id="score">0</span></span>
        <span id="inventoryDisplay"><span class="label">inv:</span> empty</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─── ROOM DATA ────────────────────────────────────────────────────────────

const ROOMS = {
  'west-of-house': {
    name: 'West of House',
    desc: 'You are standing in an open field west of a white house, with a boarded front door.',
    desc2: 'There is a small mailbox here.',
    exits: { north: 'north-of-house', south: 'south-of-house', east: 'inside-house' },
    items: ['mailbox'],
    x: 1, y: 2,
  },
  'north-of-house': {
    name: 'North of House',
    desc: 'You are facing the north side of a white house. There is no door here, and all the windows are barred.',
    exits: { south: 'west-of-house', east: 'behind-house' },
    items: [],
    x: 1, y: 0,
  },
  'south-of-house': {
    name: 'South of House',
    desc: 'You are behind the white house. A path leads into the forest to the east. In one corner of the house there is a small window which is slightly ajar.',
    exits: { north: 'west-of-house', east: 'forest-path' },
    items: [],
    x: 1, y: 3,
  },
  'behind-house': {
    name: 'Behind House',
    desc: 'You are at the rear of the white house. A garden with a well-kept lawn stretches away to the north.',
    exits: { west: 'north-of-house', north: 'garden' },
    items: [],
    x: 2, y: 0,
  },
  'garden': {
    name: 'Garden',
    desc: 'You are in a beautiful garden with flowers and a small fountain. The air is still.',
    exits: { south: 'behind-house' },
    items: ['fountain'],
    x: 2, y: -1,
  },
  'inside-house': {
    name: 'Kitchen',
    desc: 'You are in the kitchen of the white house. A table seems to have been used recently for the preparation of food. A passage leads to the west and a dark staircase can be seen leading downward. To the east is a small pantry.',
    exits: { west: 'west-of-house', down: 'cellar', east: 'pantry' },
    items: ['sack'],
    x: 2, y: 2,
  },
  'pantry': {
    name: 'Pantry',
    desc: 'You are in a cramped pantry. Shelves line the walls, mostly bare.',
    exits: { west: 'inside-house' },
    items: ['onion', 'carrot'],
    x: 3, y: 2,
  },
  'cellar': {
    name: 'Cellar',
    desc: 'You are in a dark cellar. The air is damp and musty. There is a faint rattling sound in the darkness.',
    exits: { up: 'inside-house' },
    items: ['lamp'],
    x: 2, y: 3,
  },
  'forest-path': {
    name: 'Forest Path',
    desc: 'You are on a winding path through a dark forest. Tall trees block out most of the light.',
    exits: { west: 'south-of-house', east: 'clearing', north: 'deep-forest' },
    items: [],
    x: 2, y: 4,
  },
  'clearing': {
    name: 'Clearing',
    desc: 'You have reached a small clearing. Sunlight filters through the canopy above. A wooden sign stands here.',
    exits: { west: 'forest-path' },
    items: ['sign'],
    x: 3, y: 4,
  },
  'deep-forest': {
    name: 'Deep Forest',
    desc: 'The forest grows thicker here. Strange sounds echo around you. It would be easy to get lost.',
    exits: { south: 'forest-path' },
    items: [],
    x: 2, y: 3.7,
  },
};

// ─── GRID LAYOUT for map ──────────────────────────────────────────────────

const GRID = {
  'north-of-house':  [1, 0],
  'behind-house':    [2, 0],
  'garden':          [2, -1],
  'west-of-house':   [0, 1],
  'inside-house':    [1.5, 1],
  'pantry':          [2.5, 1],
  'south-of-house':  [0, 2],
  'cellar':          [1.5, 2],
  'forest-path':     [1, 3],
  'clearing':        [2, 3],
  'deep-forest':     [1.2, 3.5],
};

// ─── GAME STATE ───────────────────────────────────────────────────────────

const state = {
  location: 'west-of-house',
  visited: new Set(),
  inventory: [],
  flags: { mailboxOpened: false, lampTaken: false, lampLit: false },
  moves: 0,
  score: 0,
  gameStarted: false,
};

// ─── DOM REFS ─────────────────────────────────────────────────────────────

const output = document.getElementById('output');
const input = document.getElementById('input');
const locationName = document.getElementById('locationName');
const moveCount = document.getElementById('moveCount');
const scoreEl = document.getElementById('score');
const inventoryDisplay = document.getElementById('inventoryDisplay');
const mapContainer = document.getElementById('mapContainer');

// ─── OUTPUT ───────────────────────────────────────────────────────────────

function print(text, cls = '') {
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = text;
  output.appendChild(p);
}

function printLines(lines) {
  for (const l of lines) {
    const p = document.createElement('p');
    if (l.cls) p.className = l.cls;
    p.textContent = l.text;
    output.appendChild(p);
  }
}

function scrollBottom() {
  output.scrollTop = output.scrollHeight;
}

// ─── MAP RENDER ──────────────────────────────────────────────────────────

function renderMap() {
  const rooms = Object.keys(ROOMS);
  const xs = rooms.map(r => GRID[r][0]);
  const ys = rooms.map(r => GRID[r][1]);
  const minX = Math.min(...xs) - 0.6;
  const maxX = Math.max(...xs) + 0.6;
  const minY = Math.min(...ys) - 0.6;
  const maxY = Math.max(...ys) + 0.6;
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;

  const pad = 20;
  const w = 240;
  const h = 220;
  const scaleX = (w - pad * 2) / rangeX;
  const scaleY = (h - pad * 2) / rangeY;
  const scale = Math.min(scaleX, scaleY);
  const offX = (w - scale * rangeX) / 2;
  const offY = (h - scale * rangeY) / 2;

  function toScreen(gx, gy) {
    const x = offX + (gx - minX) * scale;
    const y = offY + (gy - minY) * scale;
    return [x, y];
  }

  const current = state.location;
  const visited = state.visited;

  // collect edges (undirected, deduped)
  const edgeSet = new Set();
  for (const [id, room] of Object.entries(ROOMS)) {
    for (const [dir, target] of Object.entries(room.exits)) {
      const key = [id, target].sort().join('|');
      edgeSet.add(key);
    }
  }

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>`;

  // edges
  for (const key of edgeSet) {
    const [a, b] = key.split('|');
    if (!ROOMS[a] || !ROOMS[b]) continue;
    const [x1, y1] = toScreen(GRID[a][0], GRID[a][1]);
    const [x2, y2] = toScreen(GRID[b][0], GRID[b][1]);
    const used = visited.has(a) && visited.has(b);
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
      class="edge${used ? ' used' : ''}"/>`;
  }

  // rooms
  for (const [id, room] of Object.entries(ROOMS)) {
    const [cx, cy] = toScreen(GRID[id][0], GRID[id][1]);
    const rw = room.name.length * 5.5 + 10;
    const isCurrent = id === current;
    const isVisited = visited.has(id);

    let cls = 'room-rect';
    if (isCurrent) cls += ' current';
    else if (isVisited) cls += ' visited';
    else cls += ' unvisited';

    const rx = cx - rw / 2;
    const ry = cy - 6;

    svg += `<rect x="${rx}" y="${ry}" width="${rw}" height="12" class="${cls}" rx="3" ry="3"/>`;
    svg += `<text x="${cx}" y="${cy + 0.5}"
      class="room-label${isCurrent ? ' current' : ''}"
      fill="${isCurrent ? '#0f0' : isVisited ? '#0c0' : '#060'}">${room.name}</text>`;
  }

  svg += '</svg>';
  mapContainer.innerHTML = svg;
}

// ─── LOOK ─────────────────────────────────────────────────────────────────

function look() {
  const room = ROOMS[state.location];
  print(room.desc, 'highlight');
  if (room.items.length > 0) {
    for (const item of room.items) {
      print(`> ${item}`, 'item');
    }
  }
  print('');
  const exits = room.exits;
  const dirs = Object.keys(exits);
  if (dirs.length > 0) {
    print(`[Exits: ${dirs.join(', ')}]`, 'dim');
  } else {
    print('[No visible exits]', 'dim');
  }
}

// ─── MOVE ─────────────────────────────────────────────────────────────────

function move(dir) {
  const room = ROOMS[state.location];
  const target = room.exits[dir];
  if (!target) {
    print(`You can't go that way.`, 'error');
    return false;
  }
  state.location = target;
  state.visited.add(target);
  state.moves++;
  updateUI();
  const targetRoom = ROOMS[target];
  print(`> ${dir.toUpperCase()}`, 'command');
  print(targetRoom.desc, 'highlight');
  if (targetRoom.items.length > 0) {
    for (const item of targetRoom.items) {
      print(`> ${item}`, 'item');
    }
  }
  print('');
  const exits = Object.keys(targetRoom.exits);
  if (exits.length > 0) {
    print(`[Exits: ${exits.join(', ')}]`, 'dim');
  }
  print('');
  return true;
}

// ─── TAKE ─────────────────────────────────────────────────────────────────

function take(item) {
  const room = ROOMS[state.location];
  const idx = room.items.indexOf(item);
  if (idx === -1) {
    print(`You don't see ${item} here.`, 'error');
    return;
  }
  if (item === 'mailbox') {
    print(`The mailbox is firmly attached to its post. You can't take it.`, 'error');
    return;
  }
  if (item === 'fountain') {
    print(`The fountain is far too large to carry.`, 'error');
    return;
  }
  if (item === 'sign') {
    print(`The sign is embedded in the ground.`, 'error');
    return;
  }
  room.items.splice(idx, 1);
  state.inventory.push(item);
  state.score += 5;
  print(`Taken.`, 'command');
  if (item === 'lamp') state.flags.lampTaken = true;
  updateUI();
}

// ─── INVENTORY ────────────────────────────────────────────────────────────

function showInventory() {
  if (state.inventory.length === 0) {
    print('You are empty-handed.', 'dim');
  } else {
    print('You are carrying:', 'highlight');
    for (const item of state.inventory) {
      print(`  - ${item}`, 'item');
    }
  }
}

// ─── OPEN ─────────────────────────────────────────────────────────────────

function openThing(item) {
  if (item === 'mailbox' && state.location === 'west-of-house') {
    if (!state.flags.mailboxOpened) {
      state.flags.mailboxOpened = true;
      state.score += 5;
      print('Opening the small mailbox reveals a leaflet.', 'highlight');
      print('> leaflet', 'item');
      print('');
      print('[The leaflet is titled "Welcome to ZORK!"]', 'dim');
      ROOMS['west-of-house'].items.push('leaflet');
      updateUI();
    } else {
      print('The mailbox is already open.', 'dim');
    }
  } else if (item === 'mailbox') {
    print('You are not near a mailbox.', 'error');
  } else {
    print(`You can't open that.`, 'error');
  }
}

// ─── READ ─────────────────────────────────────────────────────────────────

function readThing(item) {
  if (item === 'leaflet' && state.inventory.includes('leaflet')) {
    print('"Welcome to ZORK! Your adventure has just begun. Explore, collect treasures, and above all — survive. Good luck, adventurer."', 'highlight');
  } else if (item === 'sign' && state.location === 'clearing') {
    print('The weathered wooden sign reads: "FOREST OF DARKNESS — TURN BACK NOW".', 'highlight');
  } else {
    print(`You can't read that.`, 'error');
  }
}

// ─── LAMP ─────────────────────────────────────────────────────────────────

function lightLamp() {
  if (state.inventory.includes('lamp')) {
    if (!state.flags.lampLit) {
      state.flags.lampLit = true;
      print('The lamp sputters to life, casting a warm glow around you.', 'highlight');
    } else {
      print('The lamp is already lit.', 'dim');
    }
  } else {
    print("You don't have a lamp.", 'error');
  }
}

// ─── LOOK AT ──────────────────────────────────────────────────────────────

function lookAt(item) {
  const room = ROOMS[state.location];
  const descriptions = {
    mailbox: 'A small, red metal mailbox attached to a wooden post. It looks like it might open.',
    leaflet: 'A crisp, folded leaflet with bold text on the front.',
    fountain: 'A charming stone fountain with a cherub at its center. Clear water trickles into the basin below.',
    sack: 'A burlap sack tied with a bit of twine. It rustles when you touch it.',
    lamp: 'A brass oil lamp, a bit tarnished but functional.',
    onion: 'A pungent yellow onion, slightly soft.',
    carrot: 'A long orange carrot, still with a bit of dirt on it.',
    sign: 'A wooden sign planted firmly in the earth. The carving is worn but legible.',
  };
  if (descriptions[item]) {
    print(descriptions[item], 'highlight');
  } else {
    print(`You see nothing special about ${item}.`, 'dim');
  }
}

// ─── PARSE ────────────────────────────────────────────────────────────────

const moveDirs = { n: 'north', s: 'south', e: 'east', w: 'west',
  north: 'north', south: 'south', east: 'east', west: 'west',
  n: 'north', s: 'south', e: 'east', w: 'west',
  up: 'up', down: 'down', u: 'up', d: 'down' };

function parse(input) {
  const cleaned = input.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, ' ').trim();
  if (!cleaned) return;

  const words = cleaned.split(' ');
  const verb = words[0];
  const obj = words.slice(1).join(' ');
  const noun = words[1] || '';

  print(`> ${cleaned}`, 'command');

  // Movement
  if (moveDirs[cleaned]) {
    move(moveDirs[cleaned]);
    return;
  }
  if (verb === 'go' && words[1] && moveDirs[words[1]]) {
    move(moveDirs[words[1]]);
    return;
  }
  if ((verb === 'go' || verb === 'walk' || verb === 'run') && words[1] === 'to' && words[2] && moveDirs[words[2]]) {
    move(moveDirs[words[2]]);
    return;
  }

  switch (verb) {
    case 'look': case 'l':
      if (noun === 'at' && words[2]) lookAt(words[2]);
      else look();
      break;
    case 'examine': case 'x':
      if (words[1]) lookAt(words[1]);
      else look();
      break;
    case 'take': case 'get': case 'grab':
      if (words[1]) take(words[1]);
      else print('Take what?', 'error');
      break;
    case 'inventory': case 'i':
      showInventory();
      break;
    case 'open':
      if (words[1]) openThing(words.slice(1).join(' '));
      else print('Open what?', 'error');
      break;
    case 'read':
      if (words[1]) readThing(words.slice(1).join(' '));
      else print('Read what?', 'error');
      break;
    case 'light': case 'turn':
      if (cleaned.includes('lamp') || cleaned.includes('light')) lightLamp();
      else print(`You can't light that.`, 'error');
      break;
    case 'help':
      print('Commands:', 'highlight');
      print('  n/s/e/w/u/d  — move', 'item');
      print('  look (l)     — examine surroundings', 'item');
      print('  take/get     — pick up an item', 'item');
      print('  inventory (i)— check your pockets', 'item');
      print('  open         — open something', 'item');
      print('  read         — read something', 'item');
      print('  examine/x    — look closer at something', 'item');
      print('  light/turn on— light the lamp', 'item');
      print('  quit         — end your adventure', 'item');
      break;
    case 'quit':
      print('Are you sure you want to quit? (type "yes" or "no")', 'dim');
      state.awaitingQuitConfirm = true;
      break;
    case 'yes':
      if (state.awaitingQuitConfirm) {
        print('', '');
        print('Your adventure has ended. Until next time!', 'highlight');
        input.disabled = true;
        return;
      }
      print('Yes? Yes to what?', 'error');
      break;
    case 'no':
      if (state.awaitingQuitConfirm) {
        state.awaitingQuitConfirm = false;
        print('Good. Your adventure continues.', 'dim');
      } else {
        print('No? Make up your mind!', 'error');
      }
      break;
    case 'score':
      print(`Your score is ${state.score} out of a possible ... well, who knows?`, 'highlight');
      print(`You've made ${state.moves} moves.`, 'dim');
      break;
    default:
      print("I don't understand that.", 'error');
      print(`(Try "help" for a list of commands)`, 'dim');
  }
}

// ─── UI ───────────────────────────────────────────────────────────────────

function updateUI() {
  const room = ROOMS[state.location];
  locationName.textContent = room.name;
  moveCount.textContent = state.moves;
  scoreEl.textContent = state.score;

  if (state.inventory.length === 0) {
    inventoryDisplay.innerHTML = '<span class="label">inv:</span> empty';
  } else {
    inventoryDisplay.innerHTML = `<span class="label">inv:</span> ${state.inventory.join(', ')}`;
  }

  renderMap();
}

// ─── INIT ─────────────────────────────────────────────────────────────────

function handleInput(e) {
  if (e.key === 'Enter') {
    const text = input.value;
    input.value = '';
    parse(text);
    scrollBottom();
  }
}

input.addEventListener('keydown', handleInput);

  document.getElementById('crt').classList.remove('turning-on');
  bootSequence();
  setTimeout(() => {

    input.focus();

}, 1200);
